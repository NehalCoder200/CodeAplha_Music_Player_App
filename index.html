<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="imglogo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6L1x2RgW2chYcgGnZFgiPOxsT7yDWJd23EZaJkIvMvxrIhFh5VWssdsA&s=10"
                alt="">
        </div>
        <div class="headerText">
            <h2>THE MUSIC PALYER</h2>
        </div>
        <div class="playlist">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3L20 3"></path>
                <path d="M2 10L15 10"></path>
                <path d="M2 17L9 17"></path>
                <path
                    d="M18.25 19C18.25 20.6569 16.8509 22 15.125 22C13.3991 22 12 20.6569 12 19C12 17.3431 13.3991 16 15.125 16C16.8509 16 18.25 17.3431 18.25 19ZM18.25 19V10C18.6667 10.6 19 13.12 22 13.6">
                </path>
            </svg>
        </div>
    </header>

    <main>
        <div class="center">

            <div class="vol-img-div">

                <div class="volume1">

                    <div class="volume-icons-div">

                        <svg class="volume-icons" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26"
                            height="26 color="black" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M14 14.8135V9.18646C14 6.04126 14 4.46866 13.0747 4.0773C12.1494 3.68593 11.0603 4.79793 8.88232 7.02192C7.75439 8.17365 7.11085 8.42869 5.50604 8.42869C4.10257 8.42869 3.40084 8.42869 2.89675 8.77262C1.85035 9.48655 2.00852 10.882 2.00852 12C2.00852 13.118 1.85035 14.5134 2.89675 15.2274C3.40084 15.5713 4.10257 15.5713 5.50604 15.5713C7.11085 15.5713 7.75439 15.8264 8.88232 16.9781C11.0603 19.2021 12.1494 20.3141 13.0747 19.9227C14 19.5313 14 17.9587 14 14.8135Z">
                            </path>
                            <path d="M17 9C17.6254 9.81968 18 10.8634 18 12C18 13.1366 17.6254 14.1803 17 15"></path>
                            <path d="M20 7C21.2508 8.36613 22 10.1057 22 12C22 13.8943 21.2508 15.6339 20 17"></path>
                        </svg>
                    </div>

                    <div class="volume">
                        <input type="range" min="0" max="100" value="" name="" id="">
                    </div>

                </div>



                <div class="song-img">

                </div>

            </div>

            <div class="main-deatail">

                <div class="deatails">
                    <h3 id="song-name">Simple Rock</h3>
                </div>
                <input type="range" id="song-duration">

            </div>

            <div class="mainControls">
                <div class="controls">

                    <div class="prev-icons">
                        <svg id="prev-icons" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26"
                            height="26" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path
                                d="M8.06492 12.6258C8.31931 13.8374 9.67295 14.7077 12.3802 16.4481C15.3247 18.3411 16.797 19.2876 17.9895 18.9229C18.3934 18.7994 18.7654 18.5823 19.0777 18.2876C20 17.4178 20 15.6118 20 12C20 8.38816 20 6.58224 19.0777 5.71235C18.7654 5.41773 18.3934 5.20057 17.9895 5.07707C16.797 4.71243 15.3247 5.6589 12.3802 7.55186C9.67295 9.29233 8.31931 10.1626 8.06492 11.3742C7.97836 11.7865 7.97836 12.2135 8.06492 12.6258Z"
                                stroke-linejoin="round"></path>
                            <path d="M4 4L4 20" stroke-linecap="round"></path>
                        </svg>
                    </div>

                    <div class="play-pause">

                        <svg id="play-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26"
                            height="26" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linejoin="round">
                            <path
                                d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42132C6.35159 5.02245 6.8418 4.73288 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.811 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z">
                            </path>
                        </svg>
                    </div>

                    <div class="next-icons">

                        <svg id="next-icons" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26"
                            height="26" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path
                                d="M15.9351 12.6258C15.6807 13.8374 14.327 14.7077 11.6198 16.4481C8.67528 18.3411 7.20303 19.2876 6.01052 18.9229C5.60662 18.7994 5.23463 18.5823 4.92227 18.2876C4 17.4178 4 15.6118 4 12C4 8.38816 4 6.58224 4.92227 5.71235C5.23463 5.41773 5.60662 5.20057 6.01052 5.07707C7.20304 4.71243 8.67528 5.6589 11.6198 7.55186C14.327 9.29233 15.6807 10.1626 15.9351 11.3742C16.0216 11.7865 16.0216 12.2135 15.9351 12.6258Z"
                                stroke-linejoin="round"></path>
                            <path d="M20 5V19" stroke-linecap="round"></path>
                        </svg>
                    </div>

                </div>
            </div>

        </div>

    </main>

    <script src="app.js"></script>
</body>

</html>
